services:
  # Your centralized traffic router
  gateway:
    image: nginx:latest
    container_name: main_gateway
    ports:
      - "80:80"  # Exposes Nginx to your local machine on port 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rent_app
    restart: unless-stopped

  # App 1: Rent App
  rent_app:
    build: .
    container_name: rent_app_20081
    environment:
      - APP_BASE_PATH=/rent
      - RENT_STORAGE_DIR=/code/storage
    ports:
      # Optional: Maps 20081 to your local machine for direct access without Nginx
      - "127.0.0.1:20081:20081" 
    volumes:
      # Persist your database, config, and uploads outside the container
      - ./storage:/code/storage
    restart: unless-stopped
